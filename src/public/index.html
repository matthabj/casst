<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Casst App</title>

	<link href="https://fonts.cdnfonts.com/css/finlandica" rel="stylesheet">
	<link href="https://fonts.cdnfonts.com/css/spline-sans" rel="stylesheet">
	<link rel="stylesheet" href="styles/style.css">

	<script src="scripts/utils.js"></script>
	<script defer src="scripts/script.js"></script>
</head>
<body>
	<h1>App working!</h1>
	<div class="poll">
		<header>
			<div class="icon">X</div>
			<span class="heading">Polls</span>
		</header>
		<main>
			<span class="title">What is the best color?</span>
			<div class="option">
				<span class="option-percent">50%</span>
				<span class="option-content">Blue</span>
				<span class="option-bar"></span>
			</div>
			<div class="option">
				<span class="option-percent">0%</span>
				<span class="option-content">Red</span>
				<span class="option-bar"></span>
			</div>
			<div class="option">
				<span class="option-percent">50%</span>
				<span class="option-content">Carrot</span>
				<span class="option-bar"></span>
			</div>
			<span class="meta-votes">2 votes</span>
		</main>
	</div>
	<p>Polls</p>
</body>
</html>
